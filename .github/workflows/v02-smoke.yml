name: v02-smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: python -m pip install -e .
      - name: Run v0.5 smoke test
        run: python scripts/v02_smoke.py 2>&1 | tee smoke.log
      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: v02-smoke-failure-log
          path: smoke.log
          if-no-files-found: error
