name: v02-full-smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package and test tools
        run: python -m pip install -e . pytest
      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          pytest -q 2>&1 | tee pytest.log
      - name: Check Codex skill and CLI
        run: short-drama-controller-v02 doctor
      - name: Run v0.5 full smoke
        run: python scripts/v02_full_smoke.py
      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: v02-full-smoke-failure-log
          path: pytest.log
          if-no-files-found: warn
