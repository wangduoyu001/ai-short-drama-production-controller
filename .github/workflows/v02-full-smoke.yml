name: v02-full-smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package and test tools
        run: python -m pip install -e . pytest
      - name: Run unit tests
        run: pytest -q
      - name: Check Codex skill and CLI
        run: short-drama-controller-v02 doctor
      - name: Run v0.5 full smoke
        run: python scripts/v02_full_smoke.py
