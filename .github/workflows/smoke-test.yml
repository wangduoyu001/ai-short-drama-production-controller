name: smoke-test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Run smoke test
        shell: bash
        run: |
          set -o pipefail
          python scripts/v02_smoke.py 2>&1 | tee smoke.log

      - name: Upload failure log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-failure-log
          path: smoke.log
          if-no-files-found: error
