name: Script Mixer CI

on:
  pull_request:
    paths:
      - "short_drama_controller/script_mixer/**"
      - "tests/test_script_mixer*.py"
      - "pyproject.toml"
      - ".github/workflows/script-mixer-ci.yml"
  push:
    branches:
      - "feature/script-driven-local-mixer"
    paths:
      - "short_drama_controller/script_mixer/**"
      - "tests/test_script_mixer*.py"
      - "pyproject.toml"
      - ".github/workflows/script-mixer-ci.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest

      - name: Run script mixer tests
        run: |
          pytest -q tests/test_script_mixer*.py

      - name: Verify CLI imports
        run: |
          script-driven-mixer --help
          python -m short_drama_controller.script_mixer.cli --help
